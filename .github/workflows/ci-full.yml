name: ci-full

on:
  # Triggered by the sync workflow's push of state/last-tested.json (the
  # sync uses DEPENDABOT_RECREATE_PAT so push events fire) and by manual edits.
  push:
    branches: [main]
    paths:
      - 'state/last-tested.json'
  workflow_dispatch:
  # Re-run after the base image is rebuilt so lanes that depend on baked tooling
  # (e.g. the sh-sim simulator at /opt/sh-elf) pick up the fresh :latest. This is
  # the no-PAT way to chain: GITHUB_TOKEN-dispatched events don't start runs, and
  # the sync PAT lacks the `workflow` scope. A failed rebuild would harmlessly
  # re-run ci-full on the previous image; docker-rebuild rarely fails.
  workflow_run:
    workflows: ["docker-rebuild"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

concurrency:
  group: ci-full
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/mountain-reverie/gcc-sh-base:latest
    outputs:
      commit: ${{ steps.meta.outputs.commit }}
    steps:
      - uses: actions/checkout@v6

      - name: Read tested commit
        id: meta
        run: echo "commit=$(jq -r .commit state/last-tested.json)" >> "$GITHUB_OUTPUT"

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: /tmp/.ccache
          key: ccache-sh4-${{ steps.meta.outputs.commit }}
          restore-keys: |
            ccache-sh4-

      - name: Restore GCC source clone
        uses: actions/cache@v5
        with:
          path: /tmp/gcc-src
          key: gcc-src-${{ steps.meta.outputs.commit }}
          restore-keys: |
            gcc-src-

      - name: Build cross GCC
        run: scripts/build-gcc.sh "${{ steps.meta.outputs.commit }}"

      - name: Run dejagnu sh.exp
        run: scripts/run-dejagnu.sh

      - name: Parse dejagnu results
        run: |
          mkdir -p /tmp/metrics
          python3 scripts/parse-dejagnu.py /tmp/dejagnu-out/gcc.sum \
            > /tmp/metrics/dejagnu.json
          cat /tmp/metrics/dejagnu.json

      - name: Run CSiBE size measurements
        run: scripts/run-csibe.sh

      - name: Run CoreMark size measurement
        run: scripts/run-coremark-size.sh

      - name: Build multilib SH GCC (m2/m2a/m4) for the density lane
        run: scripts/build-gcc-sh-multilib.sh

      - name: Verify SH ISA flags (m2/m2a/m4) compile-to-object
        continue-on-error: true
        run: GCC=/tmp/gcc-multilib-install/bin/sh4-linux-gnu-gcc scripts/check-sh-isa-flags.sh

      - name: Measure SH code density (m2/m2a/m4)
        run: GCC=/tmp/gcc-multilib-install/bin/sh4-linux-gnu-gcc scripts/measure-sh-density.sh

      # sh-sim lane: build the tested-commit sh-elf gcc into the baked /opt/sh-elf
      # toolchain, then EXECUTE gcc.c-torture on the SH simulator (sh-elf-run) for
      # m2/m2a/m4 — coverage QEMU (SH-4 only) and the compile-only density lane
      # can't provide. All three steps are non-fatal: a trunk build break degrades
      # to zero metrics rather than reddening the job.
      # Reclaim disk before building a third gcc: the runner has ~14 GB free and
      # three full gcc build trees overflow it (the first sh-sim CI run died with
      # "No space left on device" as the sh-elf install finished). These trees are
      # fully consumed by now — the sh4 tree (dejagnu ran in step 8), the FDPIC
      # sidecar (its libgcc.a was already copied into the install), and the density
      # multilib tree (density measured). Their installs/artifacts remain.
      - name: Free disk before the sh-sim toolchain build
        run: |
          echo "before:"; df -h / 2>/dev/null | tail -1
          rm -rf /tmp/gcc-build /tmp/gcc-build-fdpic /tmp/gcc-build-multilib
          echo "after:";  df -h / 2>/dev/null | tail -1

      - name: Build sh-elf gcc for the simulator lane
        continue-on-error: true
        run: scripts/build-sh-elf-gcc.sh "${{ steps.meta.outputs.commit }}"

      # Bounded integer slice (GLOB) keeps the per-ISA torture run to a few minutes
      # on the shared runner — the full ~1500-file suite x 3 ISAs is far too slow.
      # ieee runs in full (small). timeout-minutes is a hard cap so this lane can
      # never stall the whole job.
      - name: Run sh-sim torture (execute slice + ieee, m2/m2a/m4)
        continue-on-error: true
        timeout-minutes: 30
        env:
          GLOB: "2*.c"
        run: scripts/run-sh-sim.sh

      - name: Parse sh-sim results
        if: always()
        run: |
          mkdir -p /tmp/metrics
          python3 scripts/parse-sh-sim.py /tmp/sh-sim-out > /tmp/metrics/sh-sim.json
          cat /tmp/metrics/sh-sim.json

      # NOTE: sh-sim is NOT run against sh-lra — it needs a second /opt/sh-elf
      # install + a third GCC tree, which overflows the runner's ~14 GB. The
      # sh-lra correctness series comes from the Dejagnu run above.
      - name: Resolve devel/sh-lra HEAD
        id: shlra
        run: |
          SHA=$(git ls-remote https://github.com/olegendo/gcc.git devel/sh-lra | cut -f1)
          [ -n "$SHA" ] || { echo "::error::could not resolve devel/sh-lra"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sh-lra HEAD: $SHA"

      - name: Build sh-lra cross GCC (sh4)
        env:
          GCC_REPO: https://github.com/olegendo/gcc.git
          GCC_SRC_DIR: /tmp/gcc-src-sh-lra
          GCC_BUILD_DIR: /tmp/gcc-build-sh-lra
          GCC_PREFIX: /tmp/gcc-install-sh-lra
        run: |
          # sh-sim build tree is fully consumed by now (install already copied
          # out) — free it to make room for the sh-lra tree on the ~14 GB runner.
          rm -rf /tmp/sh-elf-gcc-build
          df -h / | tail -1
          scripts/build-gcc.sh "${{ steps.shlra.outputs.sha }}"
          df -h / | tail -1

      - name: Run CSiBE size measurements (sh-lra)
        env:
          GCC_PREFIX: /tmp/gcc-install-sh-lra
          OUT_FILE: /tmp/metrics/csibe-sh4-lra.raw.json
        run: |
          scripts/run-csibe.sh
          python3 scripts/suffix-metrics.py __lra \
            < /tmp/metrics/csibe-sh4-lra.raw.json \
            > /tmp/metrics/csibe-sh4-lra.json

      - name: Measure SH code density (sh-lra, m2/m2a/m4)
        env:
          GCC: /tmp/gcc-install-sh-lra/bin/sh4-linux-gnu-gcc
          OUT_FILE: /tmp/metrics/sh-density-lra.raw.json
        run: |
          scripts/measure-sh-density.sh
          python3 scripts/suffix-metrics.py __lra \
            < /tmp/metrics/sh-density-lra.raw.json \
            > /tmp/metrics/sh-density-lra.json

      - name: Run LRA differential watchdog
        run: scripts/run-lra-corpus.sh

      - name: Run LRA watchdog (sh-lra vs trunk)
        env:
          GCC_PREFIX: /tmp/gcc-install-sh-lra
          REF_GCC: /tmp/gcc-install/bin/sh4-linux-gnu-gcc
          METRICS_FILE: /tmp/metrics/lra-lra.raw.json
          RESULTS_FILE: /tmp/lra-results-lra.json
        run: |
          scripts/run-lra-corpus.sh
          python3 scripts/suffix-metrics.py __lra \
            < /tmp/metrics/lra-lra.raw.json \
            > /tmp/metrics/lra-lra.json

      - name: Run dejagnu sh.exp (sh-lra)
        continue-on-error: true
        env:
          GCC_PREFIX: /tmp/gcc-install-sh-lra
          GCC_BUILD_DIR: /tmp/gcc-build-sh-lra
          OUT_DIR: /tmp/dejagnu-out-sh-lra
        run: scripts/run-dejagnu.sh

      - name: Parse dejagnu results (sh-lra)
        if: always()
        run: |
          set -o pipefail
          if [ -f /tmp/dejagnu-out-sh-lra/gcc.sum ]; then
            python3 scripts/parse-dejagnu.py /tmp/dejagnu-out-sh-lra/gcc.sum \
              | python3 scripts/suffix-metrics.py __lra \
              > /tmp/metrics/dejagnu-lra.json
          else
            echo "::warning::sh-lra dejagnu produced no gcc.sum — emitting empty metrics"
            echo '[]' > /tmp/metrics/dejagnu-lra.json
          fi
          cat /tmp/metrics/dejagnu-lra.json

      - name: Free sh-lra build tree
        if: always()
        run: rm -rf /tmp/gcc-build-sh-lra

      - name: Run BusyBox build + smoke + size
        run: scripts/run-busybox.sh

      - name: Run BusyBox+musl build + smoke + size
        run: scripts/run-busybox-musl.sh

      - name: Run BusyBox+musl FDPIC build + smoke + size
        run: ABI=fdpic scripts/run-busybox-musl.sh

      - name: Run BusyBox+musl LTO build + smoke + size
        run: LTO=1 scripts/run-busybox-musl.sh

      - name: Run BusyBox+musl FDPIC+LTO build + smoke + size
        run: LTO=1 ABI=fdpic scripts/run-busybox-musl.sh

      - name: Run musl build + smoke + size
        run: scripts/run-musl.sh

      - name: Merge all metrics
        run: |
          mkdir -p metrics
          python3 scripts/merge-metrics.py \
            /tmp/metrics/dejagnu.json \
            /tmp/metrics/csibe-sh4.json \
            /tmp/metrics/coremark-sh4.json \
            /tmp/metrics/lra.json \
            /tmp/metrics/busybox-sh4.json \
            /tmp/metrics/busybox-musl-sh4.json \
            /tmp/metrics/busybox-musl-fdpic-sh4.json \
            /tmp/metrics/busybox-musl-lto-sh4.json \
            /tmp/metrics/busybox-musl-fdpic-lto-sh4.json \
            /tmp/metrics/musl-sh4.json \
            /tmp/metrics/sh-density.json \
            /tmp/metrics/sh-sim.json \
            /tmp/metrics/csibe-sh4-lra.json \
            /tmp/metrics/sh-density-lra.json \
            /tmp/metrics/lra-lra.json \
            /tmp/metrics/dejagnu-lra.json \
            > metrics/all.json
          echo "Total metric entries: $(jq length metrics/all.json)"

      - name: Upload raw dejagnu artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dejagnu-${{ steps.meta.outputs.commit }}
          path: |
            /tmp/dejagnu-out/gcc.sum
            /tmp/dejagnu-out/gcc.log.gz
          retention-days: 30

      - name: Upload raw sh-sim artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sh-sim-${{ steps.meta.outputs.commit }}
          path: /tmp/sh-sim-out/*.sum
          if-no-files-found: ignore
          retention-days: 30

      - name: Stage LRA per-case results for the publish job
        run: cp /tmp/lra-results.json metrics/lra-results.json

      - name: Stage sh-lra LRA per-case results
        run: cp /tmp/lra-results-lra.json metrics/lra-results-lra.json

      - name: Stash metrics for the publish job
        uses: actions/upload-artifact@v7
        with:
          name: metrics
          path: metrics
          retention-days: 1

  sh-regression:
    needs: [build-and-test]
    if: ${{ always() }}
    uses: ./.github/workflows/sh-regression.yml
    with:
      commit: ${{ needs.build-and-test.outputs.commit }}
      build_result: ${{ needs.build-and-test.result }}
    secrets: inherit

  publish:
    needs: [build-and-test, bench-multi]
    # Publish on partial success: if any build/bench lane failed, still deploy
    # so the working architectures keep advancing. Each failed arch contributes
    # no metrics this run, so its series simply stops at its last good commit.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEPENDABOT_RECREATE_PAT }}

      # The sh4 (build-and-test) metrics artifact is uploaded only after every
      # sh4 step succeeds, so it is all-or-nothing: if the sh4 build failed it is
      # simply absent. Tolerate that here; downstream steps key off its presence.
      - name: Fetch metrics
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: metrics
          path: metrics

      - name: Fetch multi-arch metrics
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: metrics-multi
          path: metrics-multi

      - name: Fetch dejagnu sum file
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: dejagnu-${{ needs.build-and-test.outputs.commit }}
          path: dejagnu-raw

      - name: Extract failed tests
        run: |
          mkdir -p html/dejagnu
          # No gcc.sum means the sh4 build failed before dejagnu ran. Emit an
          # empty result flagged build_failed so the panel renders cleanly
          # instead of breaking on a missing file.
          if [ ! -f dejagnu-raw/gcc.sum ]; then
            echo "::warning::dejagnu gcc.sum missing — sh4 build failed; emitting empty failures.json"
            echo '{"fail": [], "fail_stale": [], "build_failed": true}' \
              > html/dejagnu/failures.json
            exit 0
          fi
          python3 scripts/extract-failures.py \
            dejagnu-raw/gcc.sum \
            "${{ needs.build-and-test.outputs.commit }}" \
            state/dejagnu-known-stale.json \
            > html/dejagnu/failures.json
          echo "Failures: $(jq '.fail | length' html/dejagnu/failures.json) (+ $(jq '.fail_stale | length' html/dejagnu/failures.json) known-stale)"

      - name: Prepare html dir + seed benchmark data
        run: |
          mkdir -p html/benchmark
          cp -r dashboard/* html/
          # If a prior dashboard is published with valid benchmark-action data
          # (i.e. an object with .entries), seed from it so this run appends.
          # Otherwise leave the file absent — benchmark-action creates it.
          # A wrong-format seed makes the action silently skip the write.
          tmp=$(mktemp)
          if curl --silent --fail \
              "https://mountain-reverie.github.io/gcc-sh-monitor/benchmark/benchmark-data.json" \
              -o "$tmp" 2>/dev/null \
              && jq -e '.entries' "$tmp" >/dev/null 2>&1; then
            mv "$tmp" html/benchmark/benchmark-data.json
            echo "Seeded with existing benchmark-data.json"
          else
            rm -f "$tmp"
            echo "No prior valid data; benchmark-action will create the file"
          fi

      - name: Stage LRA results into html/lra/
        run: |
          mkdir -p html/lra
          if [ ! -f metrics/lra-results.json ]; then
            echo "::warning::lra-results.json missing — LRA panel will show no data"
            exit 0
          fi
          cp metrics/lra-results.json html/lra/lra-results.json

      - name: Migrate historical sh4-only metric names
        run: |
          if [ -f html/benchmark/benchmark-data.json ]; then
            python3 scripts/migrate-benchmark-data.py html/benchmark/benchmark-data.json
            echo "Migration applied."
          else
            echo "No prior data; migration skipped."
          fi

      - name: Merge sh4 + multi-arch metrics
        id: combine
        run: |
          mkdir -p metrics
          # --skip-missing: either lane may be absent on a partial run. The
          # surviving lane's metrics still get stored; the missing arch's series
          # just gets no new point this commit.
          python3 scripts/merge-metrics.py --skip-missing \
            metrics/all.json \
            metrics-multi/all-multi.json \
            > metrics/combined.json
          COUNT=$(jq length metrics/combined.json)
          echo "Combined entries: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Store benchmark result
        # Skip only when both lanes produced nothing — feeding the action an
        # empty array would error. Other steps (badges, deploy) still run.
        if: ${{ steps.combine.outputs.count != '0' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: metrics/combined.json
          benchmark-data-dir-path: html/benchmark
          external-data-json-path: html/benchmark/benchmark-data.json
          github-token: ${{ secrets.DEPENDABOT_RECREATE_PAT }}
          auto-push: false
          fail-on-alert: false
          comment-on-alert: false

      - name: Generate data.js for the chart UI
        run: |
          data=$(cat html/benchmark/benchmark-data.json 2>/dev/null || echo '{}')
          echo "window.BENCHMARK_DATA = $data" > html/benchmark/data.js

      - name: Generate status badges
        run: |
          mkdir -p html/badge

          # The sh4 metrics artifact is all-or-nothing (see Fetch metrics). If
          # it is absent the sh4 build failed: emit red "build failing" badges
          # for every sh4 metric and skip the value-based generation below.
          if [ ! -f metrics/all.json ]; then
            echo "::warning::metrics/all.json missing — sh4 build failed; emitting red badges"
            for b in dejagnu csibe coremark lra busybox musl; do
              curl -fsSL "https://img.shields.io/badge/${b}-build%20failing-red" \
                -o "html/badge/${b}.svg"
            done
            # sh-sim: literal dash in the label must be doubled for shields.io.
            curl -fsSL "https://img.shields.io/badge/sh--sim-build%20failing-red" \
              -o html/badge/sh-sim.svg
            exit 0
          fi

          # dejagnu badge — same logic as before, now reads all.json.
          FAIL=$(jq '[.[] | select(.name=="dejagnu_fail_count")][0].value' metrics/all.json)
          [[ "$FAIL" =~ ^[0-9]+$ ]] || { echo "::error::dejagnu_fail_count missing or non-numeric (got: $FAIL)"; exit 1; }
          DEJAGNU_COLOR="green"
          [ "$FAIL" -gt 0 ] && DEJAGNU_COLOR="yellow"
          [ "$FAIL" -gt 5 ] && DEJAGNU_COLOR="red"
          curl -fsSL "https://img.shields.io/badge/dejagnu-${FAIL}%20fail-${DEJAGNU_COLOR}" \
            -o html/badge/dejagnu.svg

          # csibe badge — total -Os bytes converted to KB for readability.
          CSIBE=$(jq '[.[] | select(.name=="csibe_total_os_bytes_sh4")][0].value' metrics/all.json)
          [[ "$CSIBE" =~ ^[0-9]+$ ]] || { echo "::error::csibe_total_os_bytes missing or non-numeric (got: $CSIBE)"; exit 1; }
          CSIBE_KB=$((CSIBE / 1024))
          curl -fsSL "https://img.shields.io/badge/csibe--Os-${CSIBE_KB}%20KB-blue" \
            -o html/badge/csibe.svg

          # coremark badge — .text section size in bytes.
          COREMARK=$(jq '[.[] | select(.name=="coremark_text_bytes_sh4")][0].value' metrics/all.json)
          [[ "$COREMARK" =~ ^[0-9]+$ ]] || { echo "::error::coremark_text_bytes missing or non-numeric (got: $COREMARK)"; exit 1; }
          curl -fsSL "https://img.shields.io/badge/coremark%20.text-${COREMARK}%20bytes-blue" \
            -o html/badge/coremark.svg

          # lra badge — diverged count, red if any
          LRA=$(jq '[.[] | select(.name=="lra_diverged_count")][0].value' metrics/all.json)
          [[ "$LRA" =~ ^[0-9]+$ ]] || { echo "::error::lra_diverged_count missing or non-numeric (got: $LRA)"; exit 1; }
          LRA_COLOR="green"
          [ "$LRA" -gt 0 ]  && LRA_COLOR="yellow"
          [ "$LRA" -gt 3 ]  && LRA_COLOR="red"
          curl -fsSL "https://img.shields.io/badge/lra-${LRA}%20diverged-${LRA_COLOR}" \
            -o html/badge/lra.svg

          # busybox badge — .text in KB plus smoke (P/10), coloured by smoke pass
          BBT=$(jq '[.[] | select(.name=="busybox_text_bytes_sh4")][0].value' metrics/all.json)
          [[ "$BBT" =~ ^[0-9]+$ ]] || { echo "::error::busybox_text_bytes missing or non-numeric (got: $BBT)"; exit 1; }
          BBP=$(jq '[.[] | select(.name=="busybox_smoke_pass_sh4")][0].value' metrics/all.json)
          [[ "$BBP" =~ ^[0-9]+$ ]] || { echo "::error::busybox_smoke_pass missing or non-numeric (got: $BBP)"; exit 1; }
          BBT_KB=$((BBT / 1024))
          BB_COLOR="green"
          [ "$BBP" -lt 10 ] && BB_COLOR="yellow"
          if [ "$BBP" -eq 0 ] || [ "$BBT" -eq 0 ]; then BB_COLOR="red"; fi
          curl -fsSL "https://img.shields.io/badge/busybox-${BBT_KB}%20KB%20(${BBP}%2F10)-${BB_COLOR}" \
            -o html/badge/busybox.svg

          # musl badge — libc.so .text in KB, coloured by smoke
          MLT=$(jq '[.[] | select(.name=="musl_libc_text_bytes_sh4")][0].value' metrics/all.json)
          [[ "$MLT" =~ ^[0-9]+$ ]] || { echo "::error::musl_libc_text_bytes missing or non-numeric (got: $MLT)"; exit 1; }
          MLS=$(jq '[.[] | select(.name=="musl_smoke_pass_sh4")][0].value' metrics/all.json)
          [[ "$MLS" =~ ^[0-9]+$ ]] || { echo "::error::musl_smoke_pass missing or non-numeric (got: $MLS)"; exit 1; }
          MLT_KB=$((MLT / 1024))
          ML_COLOR="green"
          [ "$MLS" -eq 0 ] && ML_COLOR="yellow"
          [ "$MLT" -eq 0 ] && ML_COLOR="red"
          curl -fsSL "https://img.shields.io/badge/musl-${MLT_KB}%20KB-${ML_COLOR}" \
            -o html/badge/musl.svg

          # sh-sim badge — simulator execution status. The known FP sim limitation
          # (compare-fp NaN/unordered) is already excluded from sh_sim_fail_count by
          # parse-sh-sim.py, so "success" here means no *new* execution failures.
          # pass==0 means the sh-elf build failed this run → red. ("sh-sim" has a
          # literal dash, doubled to "sh--sim" for shields.io.)
          SHSIM_FAIL=$(jq '[.[] | select(.name=="sh_sim_fail_count")][0].value' metrics/all.json)
          SHSIM_PASS=$(jq '[.[] | select(.name=="sh_sim_pass_count")][0].value' metrics/all.json)
          [[ "$SHSIM_FAIL" =~ ^[0-9]+$ ]] || { echo "::error::sh_sim_fail_count missing or non-numeric (got: $SHSIM_FAIL)"; exit 1; }
          [[ "$SHSIM_PASS" =~ ^[0-9]+$ ]] || { echo "::error::sh_sim_pass_count missing or non-numeric (got: $SHSIM_PASS)"; exit 1; }
          if [ "$SHSIM_PASS" -eq 0 ]; then
            curl -fsSL "https://img.shields.io/badge/sh--sim-build%20failing-red" \
              -o html/badge/sh-sim.svg
          else
            SHSIM_COLOR="green"; SHSIM_MSG="${SHSIM_PASS}%20pass"
            if [ "$SHSIM_FAIL" -gt 0 ]; then SHSIM_COLOR="yellow"; SHSIM_MSG="${SHSIM_FAIL}%20fail"; fi
            [ "$SHSIM_FAIL" -gt 5 ] && SHSIM_COLOR="red"
            curl -fsSL "https://img.shields.io/badge/sh--sim-${SHSIM_MSG}-${SHSIM_COLOR}" \
              -o html/badge/sh-sim.svg
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: html

      - name: Deploy to Pages
        uses: actions/deploy-pages@v5

  build-arm:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/mountain-reverie/gcc-sh-base:latest
    steps:
      - uses: actions/checkout@v6

      - name: Read tested commit
        id: meta
        run: echo "commit=$(jq -r .commit state/last-tested.json)" >> "$GITHUB_OUTPUT"

      - name: Restore ccache (arm)
        uses: actions/cache@v5
        with:
          path: /tmp/.ccache
          key: ccache-arm-${{ steps.meta.outputs.commit }}
          restore-keys: |
            ccache-arm-

      - name: Restore GCC source clone (shared across targets)
        uses: actions/cache@v5
        with:
          path: /tmp/gcc-src
          key: gcc-src-${{ steps.meta.outputs.commit }}
          restore-keys: |
            gcc-src-

      - name: Build arm GCC
        run: scripts/build-gcc.sh "${{ steps.meta.outputs.commit }}" arm-linux-gnueabihf

      - name: Upload arm install artifact
        uses: actions/upload-artifact@v7
        with:
          name: gcc-install-arm
          path: /tmp/gcc-install-arm
          retention-days: 7

  build-x86:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/mountain-reverie/gcc-sh-base:latest
    steps:
      - uses: actions/checkout@v6

      - name: Read tested commit
        id: meta
        run: echo "commit=$(jq -r .commit state/last-tested.json)" >> "$GITHUB_OUTPUT"

      - name: Restore ccache (x86)
        uses: actions/cache@v5
        with:
          path: /tmp/.ccache
          key: ccache-x86-${{ steps.meta.outputs.commit }}
          restore-keys: |
            ccache-x86-

      - name: Restore GCC source clone (shared across targets)
        uses: actions/cache@v5
        with:
          path: /tmp/gcc-src
          key: gcc-src-${{ steps.meta.outputs.commit }}
          restore-keys: |
            gcc-src-

      - name: Build x86 GCC
        run: scripts/build-gcc.sh "${{ steps.meta.outputs.commit }}" i686-linux-gnu

      - name: Upload x86 install artifact
        uses: actions/upload-artifact@v7
        with:
          name: gcc-install-x86
          path: /tmp/gcc-install-x86
          retention-days: 7

  build-riscv32:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Newer lane: a build hiccup here must not fail the whole multi-arch run.
    continue-on-error: true
    container:
      image: ghcr.io/mountain-reverie/gcc-sh-base:latest
    steps:
      - uses: actions/checkout@v6

      - name: Read tested commit
        id: meta
        run: echo "commit=$(jq -r .commit state/last-tested.json)" >> "$GITHUB_OUTPUT"

      - name: Restore ccache (riscv32)
        uses: actions/cache@v5
        with:
          path: /tmp/.ccache
          key: ccache-riscv32-${{ steps.meta.outputs.commit }}
          restore-keys: |
            ccache-riscv32-

      - name: Restore GCC source clone (shared across targets)
        uses: actions/cache@v5
        with:
          path: /tmp/gcc-src
          key: gcc-src-${{ steps.meta.outputs.commit }}
          restore-keys: |
            gcc-src-

      # The triple is riscv64-linux-gnu but the toolchain defaults to
      # rv32gc/ilp32d (32-bit RISC-V) — see build-gcc.sh.
      - name: Build riscv32 GCC
        run: scripts/build-gcc.sh "${{ steps.meta.outputs.commit }}" riscv64-linux-gnu

      - name: Upload riscv32 install artifact
        uses: actions/upload-artifact@v7
        with:
          name: gcc-install-riscv32
          path: /tmp/gcc-install-riscv32
          retention-days: 7

  bench-multi:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    container:
      image: ghcr.io/mountain-reverie/gcc-sh-base:latest
    needs: [build-arm, build-x86, build-riscv32]
    # Run even if a build lane failed: measure whichever installs exist so one
    # arch's build break doesn't freeze the others. Per-arch steps below skip
    # cleanly when their install is missing.
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6

      - name: Read tested commit
        id: meta
        run: echo "commit=$(jq -r .commit state/last-tested.json)" >> "$GITHUB_OUTPUT"

      - name: Download arm install
        uses: actions/download-artifact@v8
        continue-on-error: true   # arm build may have failed
        with:
          name: gcc-install-arm
          path: /tmp/gcc-install-arm

      - name: Download x86 install
        uses: actions/download-artifact@v8
        continue-on-error: true   # x86 build may have failed
        with:
          name: gcc-install-x86
          path: /tmp/gcc-install-x86

      - name: Download riscv32 install
        uses: actions/download-artifact@v8
        continue-on-error: true   # rv32 build may have been skipped/failed
        with:
          name: gcc-install-riscv32
          path: /tmp/gcc-install-riscv32

      - name: Restore executable bits on downloaded installs
        # Artifact download via actions/download-artifact@v8 can drop +x bits
        # on regular files. Restore so the GCC binaries can be invoked.
        run: |
          find /tmp/gcc-install-arm/bin /tmp/gcc-install-arm/libexec \
               /tmp/gcc-install-x86/bin /tmp/gcc-install-x86/libexec \
               /tmp/gcc-install-riscv32/bin /tmp/gcc-install-riscv32/libexec \
               -type f -exec chmod +x {} \; 2>/dev/null || true

      - name: Run all size benchmarks for arm
        continue-on-error: true   # a measurement failure must not abort other arches
        env:
          TARGET: arm-linux-gnueabihf
          GCC_PREFIX: /tmp/gcc-install-arm
        run: |
          if [ ! -x "$GCC_PREFIX/bin/${TARGET}-gcc" ]; then
            echo "::warning::arm GCC install missing — skipping arm benchmarks (series will stop)"
            exit 0
          fi
          scripts/run-csibe.sh
          scripts/run-coremark-size.sh
          scripts/run-busybox.sh
          scripts/run-busybox-musl.sh
          LTO=1 scripts/run-busybox-musl.sh
          scripts/run-musl.sh

      - name: Run all size benchmarks for x86
        continue-on-error: true   # a measurement failure must not abort other arches
        env:
          TARGET: i686-linux-gnu
          GCC_PREFIX: /tmp/gcc-install-x86
        run: |
          if [ ! -x "$GCC_PREFIX/bin/${TARGET}-gcc" ]; then
            echo "::warning::x86 GCC install missing — skipping x86 benchmarks (series will stop)"
            exit 0
          fi
          scripts/run-csibe.sh
          scripts/run-coremark-size.sh
          scripts/run-busybox.sh
          scripts/run-busybox-musl.sh
          LTO=1 scripts/run-busybox-musl.sh
          scripts/run-musl.sh

      # 32-bit RISC-V: musl-only (no rv32 glibc). BusyBox+musl size+smoke is the
      # comparison lane; run-busybox-musl emits zero metrics if the rv32 install
      # is missing, so this never breaks the merge.
      - name: Run busybox-musl for riscv32
        continue-on-error: true   # a measurement failure must not abort the merge
        env:
          TARGET: riscv64-linux-gnu
          GCC_PREFIX: /tmp/gcc-install-riscv32
        run: |
          scripts/run-busybox-musl.sh
          LTO=1 scripts/run-busybox-musl.sh

      - name: Merge multi-arch metrics
        run: |
          mkdir -p metrics-multi
          # --skip-missing: any arch whose build or measurement failed produced
          # no JSON; skip it rather than abort. Its series stops this commit.
          python3 scripts/merge-metrics.py --skip-missing \
            /tmp/metrics/csibe-arm.json \
            /tmp/metrics/coremark-arm.json \
            /tmp/metrics/busybox-arm.json \
            /tmp/metrics/busybox-musl-arm.json \
            /tmp/metrics/busybox-musl-lto-arm.json \
            /tmp/metrics/musl-arm.json \
            /tmp/metrics/csibe-x86.json \
            /tmp/metrics/coremark-x86.json \
            /tmp/metrics/busybox-x86.json \
            /tmp/metrics/busybox-musl-x86.json \
            /tmp/metrics/busybox-musl-lto-x86.json \
            /tmp/metrics/musl-x86.json \
            /tmp/metrics/busybox-musl-riscv32.json \
            /tmp/metrics/busybox-musl-lto-riscv32.json \
            > metrics-multi/all-multi.json
          echo "Multi-arch entries: $(jq length metrics-multi/all-multi.json)"

      - name: Upload multi-arch metrics
        uses: actions/upload-artifact@v7
        with:
          name: metrics-multi
          path: metrics-multi
          retention-days: 7
