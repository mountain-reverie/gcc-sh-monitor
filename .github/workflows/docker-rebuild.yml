name: docker-rebuild

on:
  schedule:
    - cron: '0 4 1 * *'   # 04:00 UTC on the 1st of each month
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.gcc-sh-base'
      - '.github/workflows/docker-rebuild.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-rebuild
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: echo "tag=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/Dockerfile.gcc-sh-base
          push: true
          tags: |
            ghcr.io/mountain-reverie/gcc-sh-base:${{ steps.tag.outputs.tag }}
            ghcr.io/mountain-reverie/gcc-sh-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Re-run ci-full against the freshly built :latest image so lanes that
      # depend on baked tooling (e.g. the sh-sim simulator at /opt/sh-elf) pick it
      # up without a manual trigger. GITHUB_TOKEN cannot dispatch workflows, so use
      # the same PAT the sync workflow uses. Non-fatal: if the PAT lacks the
      # `workflow` scope, the image is still published and ci-full can be run by hand.
      - name: Trigger ci-full on the refreshed image
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_RECREATE_PAT }}
        run: |
          echo "Dispatching ci-full to re-run on gcc-sh-base:latest ..."
          gh workflow run ci-full.yml --repo "${{ github.repository }}"
