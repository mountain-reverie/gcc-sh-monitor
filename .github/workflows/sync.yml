name: sync-upstream

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT so the resulting `git push` is authored by a real user and
      # triggers downstream workflows (ci-full via its push paths filter).
      # GITHUB_TOKEN-authored pushes are silently dropped by GitHub's
      # recursion-prevention policy.
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.DEPENDABOT_RECREATE_PAT }}

      - name: Run sync-check
        id: check
        run: scripts/sync-check.sh | tee -a "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "gcc-sh-monitor[bot]"
          git config user.email "noreply@github.com"
          git add state/last-tested.json
          git commit -m "sync: upstream ${{ steps.check.outputs.commit }}"
          git push
