<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>gcc-sh-monitor — LRA differential</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header>
    <h1><a href="../">gcc-sh-monitor</a> · LRA differential</h1>
    <p id="summary" class="muted">Loading…</p>
  </header>

  <main>
    <table id="lra-table" class="lra">
      <thead>
        <tr id="lra-head"><th>Case</th></tr>
      </thead>
      <tbody id="lra-body"></tbody>
    </table>

    <h2>sh-lra branch (vs Debian)</h2>
    <p id="lra-shlra-summary" class="muted">Loading…</p>
    <table id="lra-shlra-table" class="lra">
      <thead>
        <tr id="lra-shlra-head"><th>Case</th></tr>
      </thead>
      <tbody id="lra-shlra-body"></tbody>
    </table>
  </main>

  <footer>
    <p>
      Raw: <a href="lra-results.json">lra-results.json</a> ·
      <a href="lra-results-lra.json">lra-results-lra.json</a> ·
      <a href="https://github.com/mountain-reverie/gcc-sh-monitor/tree/main/lra-corpus">corpus source</a> ·
      <a href="https://github.com/mountain-reverie/gcc-sh-monitor">repo</a>
    </p>
  </footer>

  <script>
    const REPO_BLOB = "https://github.com/mountain-reverie/gcc-sh-monitor/blob/main/lra-corpus";

    fetch("lra-results.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => render(data, {
        summaryEl: document.getElementById("summary"),
        headEl: document.getElementById("lra-head"),
        bodyEl: document.getElementById("lra-body"),
        commitBaseUrl: "https://github.com/gcc-mirror/gcc/commit/",
        summaryPrefix: "From upstream commit",
      }))
      .catch(_ => {
        document.getElementById("summary").textContent =
          "No LRA results published yet.";
      });

    fetch("lra-results-lra.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => render(data, {
        summaryEl: document.getElementById("lra-shlra-summary"),
        headEl: document.getElementById("lra-shlra-head"),
        bodyEl: document.getElementById("lra-shlra-body"),
        commitBaseUrl: "https://github.com/olegendo/gcc/commit/",
        summaryPrefix: "From Oleg's devel/sh-lra branch commit",
      }))
      .catch(_ => {
        document.getElementById("lra-shlra-summary").textContent =
          "No sh-lra LRA results yet.";
      });

    function render(data, target) {
      const { summaryEl, headEl, bodyEl, commitBaseUrl, summaryPrefix } = target;
      const shortCommit = data.commit.slice(0, 12);
      summaryEl.innerHTML =
        `${summaryPrefix} <a href="${commitBaseUrl}${data.commit}"><code>${shortCommit}</code></a>` +
        `, recorded ${data.date}, compared vs the Debian reference. ` +
        `<strong>${data.totals.diverged}</strong> diverged of ${data.totals.total} tuples ` +
        `(<strong>${data.totals.current_ice}</strong> ICE in current).`;

      // Discover the union of opt levels across all cases.
      const optSet = new Set();
      for (const c of data.cases) for (const r of c.results) optSet.add(r.opt);
      const opts = Array.from(optSet).sort();

      // Head row.
      for (const opt of opts) {
        const th = document.createElement("th");
        th.textContent = "-" + opt;
        headEl.appendChild(th);
      }

      // Body rows.
      for (const c of data.cases) {
        const tr = document.createElement("tr");
        const nameCell = document.createElement("td");
        const a = document.createElement("a");
        a.href = `${REPO_BLOB}/${c.name}`;
        a.textContent = c.name;
        a.target = "_blank";
        a.rel = "noopener";
        nameCell.appendChild(a);
        tr.appendChild(nameCell);

        const byOpt = Object.fromEntries(c.results.map(r => [r.opt, r]));
        for (const opt of opts) {
          const cell = document.createElement("td");
          const r = byOpt[opt];
          if (!r) {
            cell.className = "outcome skipped";
            cell.textContent = "—";
          } else {
            cell.className = "outcome " + r.outcome.toLowerCase();
            cell.textContent = shortLabel(r.outcome);
            if (r.detail) cell.title = r.detail;
          }
          tr.appendChild(cell);
        }
        bodyEl.appendChild(tr);
      }
    }

    function shortLabel(outcome) {
      return {
        BOTH_OK:     "✓",
        DIVERGED:    "≠",
        CURRENT_ICE: "ICE",
        REF_ICE:     "ref-ICE",
        BOTH_ICE:    "both-ICE",
        TIMEOUT:     "⏱",
        SKIPPED:     "—",
      }[outcome] || outcome;
    }
  </script>
</body>
</html>
