<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>gcc-sh-monitor — correctness &amp; size trends</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="data.js"></script>
  <style>
    /* This page is chart-dense — use the full browser width and lay the
       charts out in a responsive grid (as many columns as fit). */
    body { max-width: none; padding-inline: 2rem; }
    #charts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(26rem, 1fr));
      gap: 1rem 1.5rem;
      align-items: start;
    }
    #charts section { margin: 0; min-width: 0; }   /* min-width:0 lets charts shrink in grid cells */
    #charts section h2 { margin: 0 0 0.3rem; font-size: 1rem; word-break: break-word; }
    .chart-box { position: relative; height: 16rem; }
    @media (max-width: 28rem) { body { padding-inline: 1rem; } }
  </style>
</head>
<body>
  <header>
    <h1><a href="../">gcc-sh-monitor</a> · correctness &amp; size trends</h1>
    <p>Dejagnu correctness plus code-size benchmarks (CSiBE, CoreMark,
    BusyBox, musl) across sh4/arm/x86. One chart per metric, one point per
    upstream commit tested.</p>
  </header>

  <main id="charts"></main>

  <footer>
    <p>
      Raw data: <a href="benchmark-data.json">benchmark-data.json</a> ·
      <a href="https://github.com/mountain-reverie/gcc-sh-monitor">source</a>
    </p>
  </footer>

  <script>
    const data = window.BENCHMARK_DATA || { entries: {} };
    const main = document.getElementById("charts");

    const ARCH_RE = /_(sh4|arm|x86|riscv32)$/;
    const ARCH_COLORS = { sh4: "#3b82f6", arm: "#10b981", x86: "#f59e0b", riscv32: "#a855f7" };
    const ARCH_ORDER = ["sh4", "arm", "x86", "riscv32"];

    function splitArch(name) {
      const m = name.match(ARCH_RE);
      if (m) return { base: name.slice(0, -m[0].length), arch: m[1] };
      return { base: name, arch: null };
    }

    // Collect (timestamp, value) series per metric name across all entries.
    const byMetric = {};
    for (const suite of Object.values(data.entries || {})) {
      for (const run of suite) {
        for (const b of run.benches) {
          if (!byMetric[b.name]) byMetric[b.name] = [];
          byMetric[b.name].push({
            x: run.date,
            y: b.value,
            commit: run.commit.id.slice(0, 7),
            url: run.commit.url,
            unit: b.unit,
          });
        }
      }
    }

    if (Object.keys(byMetric).length === 0) {
      main.innerHTML = "<p>No data yet — waiting for the first ci-full run.</p>";
    }

    // Group metrics by base name, splitting out arch suffixes into series.
    const byBase = {};
    for (const [name, points] of Object.entries(byMetric)) {
      points.sort((a, b) => a.x - b.x);
      const { base, arch } = splitArch(name);
      if (!byBase[base]) byBase[base] = {};
      if (arch === null) {
        byBase[base]._ = points;
      } else {
        byBase[base][arch] = points;
      }
    }

    for (const base of Object.keys(byBase).sort()) {
      const archMap = byBase[base];

      const section = document.createElement("section");
      const h2 = document.createElement("h2");
      h2.textContent = base;
      section.appendChild(h2);
      const box = document.createElement("div");
      box.className = "chart-box";
      const canvas = document.createElement("canvas");
      box.appendChild(canvas);
      section.appendChild(box);
      main.appendChild(section);

      let datasets;
      let unit;
      if (archMap._) {
        unit = archMap._[0].unit;
        datasets = [{
          label: base,
          data: archMap._,
          borderColor: "#0066cc",
          backgroundColor: "#0066cc22",
          tension: 0.1,
          pointRadius: 4,
        }];
      } else {
        const archesPresent = ARCH_ORDER.filter((a) => archMap[a]);
        unit = archMap[archesPresent[0]][0].unit;
        datasets = archesPresent.map((a) => ({
          label: a,
          data: archMap[a],
          borderColor: ARCH_COLORS[a],
          backgroundColor: ARCH_COLORS[a] + "22",
          tension: 0.1,
          pointRadius: 4,
        }));
      }

      new Chart(canvas, {
        type: "line",
        data: { datasets },
        options: {
          parsing: false,
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { type: "time", time: { unit: "day" } },
            y: { beginAtZero: true, title: { display: true, text: unit } },
          },
          plugins: {
            tooltip: {
              callbacks: {
                title: (items) => {
                  const d = new Date(items[0].raw.x);
                  return d.toISOString().slice(0, 19) + "Z";
                },
                label: (item) => {
                  const prefix = item.dataset.label ? `${item.dataset.label}: ` : "";
                  return `${prefix}${item.raw.y} ${item.raw.unit} (${item.raw.commit})`;
                },
              },
            },
            legend: { display: datasets.length > 1 },
          },
        },
      });
    }
  </script>
</body>
</html>
