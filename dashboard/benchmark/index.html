<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>gcc-sh-monitor — correctness &amp; size trends</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="data.js"></script>
  <style>
    /* This page is chart-dense — use the full browser width and lay the
       charts out in a responsive grid (as many columns as fit). */
    body { max-width: none; padding-inline: 2rem; }
    #charts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(26rem, 1fr));
      gap: 1rem 1.5rem;
      align-items: start;
    }
    #charts section { margin: 0; min-width: 0; }   /* min-width:0 lets charts shrink in grid cells */
    #charts section h2 { margin: 0 0 0.3rem; font-size: 1rem; word-break: break-word; }
    .chart-box { position: relative; height: 16rem; }
    @media (max-width: 28rem) { body { padding-inline: 1rem; } }
  </style>
</head>
<body>
  <header>
    <h1><a href="../">gcc-sh-monitor</a> · correctness &amp; size trends</h1>
    <p>Dejagnu correctness plus code-size benchmarks (CSiBE, CoreMark,
    BusyBox, musl) across sh4/arm/x86. One chart per metric, one point per
    upstream commit tested.</p>
  </header>

  <main id="charts"></main>

  <footer>
    <p>
      Raw data: <a href="benchmark-data.json">benchmark-data.json</a> ·
      <a href="https://github.com/mountain-reverie/gcc-sh-monitor">source</a>
    </p>
  </footer>

  <script>
    const data = window.BENCHMARK_DATA || { entries: {} };
    const main = document.getElementById("charts");

    const ARCH_RE = /_(sh4|arm|x86|riscv32)$/;
    const ARCH_COLORS = { sh4: "#3b82f6", arm: "#10b981", x86: "#f59e0b", riscv32: "#a855f7" };
    const ARCH_ORDER = ["sh4", "arm", "x86", "riscv32"];

    // FDPIC (sh4-only) variants share one chart, keyed by LTO state rather than
    // arch. The `_fdpic` guard in resolve() scopes this so the non-fdpic `_lto`
    // charts stay arch-keyed and unchanged.
    const FDPIC_VARIANTS = {
      "fdpic":      { label: "fdpic",      color: "#3b82f6", order: 0 },
      "fdpic +LTO": { label: "fdpic +LTO", color: "#f59e0b", order: 1 },
    };

    function splitArch(name) {
      const m = name.match(ARCH_RE);
      if (m) return { base: name.slice(0, -m[0].length), arch: m[1] };
      return { base: name, arch: null };
    }

    // Resolve a metric name to its chart (chartBase) and the series within it.
    //   Most metrics: one chart per base, one series per arch.
    //   FDPIC: busybox_musl_fdpic[_lto]_* collapse to a single chart whose two
    //   series are the LTO variants (fdpic vs fdpic +LTO) — arch is always sh4.
    function resolve(name) {
      const { base, arch } = splitArch(name);
      if (base.includes("_fdpic")) {
        const lto = base.includes("_fdpic_lto");
        const chartBase = lto ? base.replace("_fdpic_lto", "_fdpic") : base;
        const key = lto ? "fdpic +LTO" : "fdpic";
        const v = FDPIC_VARIANTS[key];
        return { chartBase, seriesKey: key, label: v.label, color: v.color, order: v.order };
      }
      if (arch === null) {
        return { chartBase: base, seriesKey: "_", label: base, color: "#0066cc", order: 0 };
      }
      return {
        chartBase: base, seriesKey: arch, label: arch,
        color: ARCH_COLORS[arch], order: ARCH_ORDER.indexOf(arch),
      };
    }

    // Collect (timestamp, value) series per metric name across all entries.
    const byMetric = {};
    for (const suite of Object.values(data.entries || {})) {
      for (const run of suite) {
        for (const b of run.benches) {
          if (!byMetric[b.name]) byMetric[b.name] = [];
          byMetric[b.name].push({
            x: run.date,
            y: b.value,
            commit: run.commit.id.slice(0, 7),
            url: run.commit.url,
            unit: b.unit,
          });
        }
      }
    }

    if (Object.keys(byMetric).length === 0) {
      main.innerHTML = "<p>No data yet — waiting for the first ci-full run.</p>";
    }

    // Group metrics into charts, splitting arch suffixes (or, for FDPIC, the
    // LTO variant) into the series that make up each chart.
    const byBase = {};
    for (const [name, points] of Object.entries(byMetric)) {
      points.sort((a, b) => a.x - b.x);
      const { chartBase, seriesKey, label, color, order } = resolve(name);
      if (!byBase[chartBase]) byBase[chartBase] = {};
      byBase[chartBase][seriesKey] = { points, label, color, order };
    }

    for (const base of Object.keys(byBase).sort()) {
      const series = Object.values(byBase[base]).sort((a, b) => a.order - b.order);

      const section = document.createElement("section");
      const h2 = document.createElement("h2");
      h2.textContent = base;
      section.appendChild(h2);
      const box = document.createElement("div");
      box.className = "chart-box";
      const canvas = document.createElement("canvas");
      box.appendChild(canvas);
      section.appendChild(box);
      main.appendChild(section);

      const unit = series[0].points[0].unit;
      const datasets = series.map((s) => ({
        label: s.label,
        data: s.points,
        borderColor: s.color,
        backgroundColor: s.color + "22",
        tension: 0.1,
        pointRadius: 4,
      }));

      new Chart(canvas, {
        type: "line",
        data: { datasets },
        options: {
          parsing: false,
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { type: "time", time: { unit: "day" } },
            y: { beginAtZero: true, title: { display: true, text: unit } },
          },
          plugins: {
            tooltip: {
              callbacks: {
                title: (items) => {
                  const d = new Date(items[0].raw.x);
                  return d.toISOString().slice(0, 19) + "Z";
                },
                label: (item) => {
                  const prefix = item.dataset.label ? `${item.dataset.label}: ` : "";
                  return `${prefix}${item.raw.y} ${item.raw.unit} (${item.raw.commit})`;
                },
              },
            },
            legend: { display: datasets.length > 1 },
          },
        },
      });
    }
  </script>
</body>
</html>
